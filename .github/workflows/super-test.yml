name: GrassRoots Super Test — grassroots-web (Next.js)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Build + Lint ──────────────────────────────────────────────────────────────
  build-and-lint:
    name: Build + Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://bhora-ai.onrender.com/api/v1
        # next build respects ignoreBuildErrors / ignoreDuringBuilds in next.config.mjs

      - name: ESLint check
        run: npm run lint

  # ── JOB 2: Placeholder — tests will be added when spec files exist ──────────
  # run-tests: (disabled until tests/registration.spec.ts etc. are written)
