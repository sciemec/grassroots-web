name: Full Quality Gate — grassroots-web (Next.js)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build + Lint + Registration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build check
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://bhora-ai.onrender.com/api/v1

      - name: Lint check
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run ALL Tests (registration + auth + public pages)
        run: npx playwright test tests/
        env:
          NEXT_PUBLIC_API_URL: https://bhora-ai.onrender.com/api/v1
